name: Run By Label

on:
  workflow_dispatch:
    inputs:
      TEST_LABEL:
        description: 'Label to filter tests (e.g., @smoke1)'
        required: true
        default: '@smoke1'

jobs:
  prepare-system:
    timeout-minutes: 60
    runs-on: self-hosted
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright
      run: npm init playwright@latest --install-deps -y
    
    - name: Install cromium shell
      run: npx playwright install chromium


  run-tests:
    needs: prepare-system
    timeout-minutes: 60
    runs-on: self-hosted
    strategy:
      matrix:
        browser: [chromium, firefox]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ matrix.browser }}-${{ runner.os }}
          restore-keys: |
            playwright-${{ matrix.browser }}-

      - name: Install Playwright
        run: npm init playwright@latest --install-deps

      - name: Install ${{ matrix.browser }} browser
        run: npx playwright install ${{ matrix.browser }} --no-shell

      - name: Run Playwright tests
        run: npx playwright test -g "${{ github.event.inputs.TEST_LABEL }}" --project=${{ matrix.browser }}
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 30

      - name: Fail if tests failed
        if: failure()
        run: exit 1
